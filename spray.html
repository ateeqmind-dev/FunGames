<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spray Can</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f0f13; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        
        /* The canvas itself has a slight texture for that "wall" feel */
        canvas { 
            display: block; width: 100vw; height: 100vh; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
        
        /* UI Buttons */
        .btn {
            position: absolute; top: 20px; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.2rem; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 20; text-decoration: none;
        }
        #btn-info { left: 20px; }
        #btn-back { right: 20px; }

        /* Current Color Indicator */
        #color-indicator {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 15px currentColor; z-index: 20; transition: background-color 0.3s;
        }

        /* Start Overlay */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 19, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; color: white; text-align: center; padding: 20px;
        }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background: #ff003c; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* Info Modal */
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c24; border: 1px solid #ff003c; padding: 30px; border-radius: 16px;
            width: 80%; max-width: 400px; text-align: center; z-index: 40; color: white;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.2); display: none;
        }
        .close-modal { 
            background: #ff003c; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="btn" id="btn-info">ℹ️</button>
    <a href="index.html" class="btn" id="btn-back">✖</a>
    <div id="color-indicator"></div>

    <div id="info-modal">
        <h2 style="color: #ff003c; margin-bottom: 10px;">Spray Can</h2>
        <p style="color: #888899; line-height: 1.5;">Touch the screen to spray neon paint.<br><br><b>Shake your phone</b> to rattle the can and change colors.<br><b>Tilt your phone</b> steeply while spraying to make the paint drip!</p>
        <button class="close-modal" onclick="document.getElementById('info-modal').style.display='none'">Got it</button>
    </div>

    <div id="start-overlay">
        <h2>Motion Sensors Required</h2>
        <p style="color: #888899; margin-top: 10px;">This game tracks shaking (to mix paint) and tilting (for drips).</p>
        <button id="start-btn">Enable Sensors & Start</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const colorIndicator = document.getElementById('color-indicator');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('btn-info').onclick = () => document.getElementById('info-modal').style.display = 'block';

        // Game State
        let isSpraying = false;
        let sprayX = 0, sprayY = 0;
        let hue = 345; // Start with neon pink/red
        let drips = [];
        let tiltGravity = 0;

        // Shake State
        let lastX, lastY, lastZ;
        let lastTime = 0;
        const SHAKE_THRESHOLD = 15;

        // Update UI Color
        function updateColor() {
            let colorStr = `hsl(${hue}, 100%, 50%)`;
            colorIndicator.style.backgroundColor = colorStr;
            colorIndicator.style.color = colorStr; // For the glow shadow
        }
        updateColor();

        // Start Sensors
        document.getElementById('start-btn').addEventListener('click', async () => {
            let motionGranted = false;
            let orientGranted = false;

            // Request DeviceMotion (Shake)
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceMotionEvent.requestPermission();
                    if (state === 'granted') motionGranted = true;
                } catch (e) { console.error(e); }
            } else { motionGranted = true; }

            // Request DeviceOrientation (Tilt)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    if (state === 'granted') orientGranted = true;
                } catch (e) { console.error(e); }
            } else { orientGranted = true; }

            if (motionGranted) window.addEventListener('devicemotion', handleMotion);
            if (orientGranted) window.addEventListener('deviceorientation', handleOrientation);

            document.getElementById('start-overlay').style.display = 'none';
            loop(); // Start rendering
        });

        // Touch Input
        canvas.addEventListener('pointerdown', (e) => { isSpraying = true; sprayX = e.clientX; sprayY = e.clientY; });
        canvas.addEventListener('pointermove', (e) => { sprayX = e.clientX; sprayY = e.clientY; });
        canvas.addEventListener('pointerup', () => { isSpraying = false; });
        canvas.addEventListener('pointerout', () => { isSpraying = false; });

        // Shake Detection (Change Color)
        function handleMotion(e) {
            let current = e.accelerationIncludingGravity;
            if (!current || !current.x) return;

            let currentTime = Date.now();
            if ((currentTime - lastTime) > 100) {
                let diffTime = (currentTime - lastTime);
                lastTime = currentTime;
                let speed = Math.abs(current.x + current.y + current.z - lastX - lastY - lastZ) / diffTime * 10000;

                if (speed > SHAKE_THRESHOLD) {
                    hue = (hue + 60) % 360; // Jump to next vibrant color
                    updateColor();
                }

                lastX = current.x; lastY = current.y; lastZ = current.z;
            }
        }

        // Tilt Detection (Drip Gravity)
        function handleOrientation(e) {
            // Beta is front-to-back tilt (-180 to 180). 
            // 90 is standing straight up. > 45 means we are holding it vertically enough to drip.
            let tiltY = e.beta; 
            if (tiltY > 40 && tiltY < 140) {
                tiltGravity = (tiltY - 40) / 100; // Map to a gravity factor 0.0 to 1.0
            } else {
                tiltGravity = 0;
            }
        }

        function loop() {
            // Spray Paint Logic
            if (isSpraying) {
                const density = 40; // Particles per frame
                const radius = 25; // Spray spread
                
                ctx.fillStyle = `hsla(${hue}, 100%, 50%, 0.15)`; // Semi-transparent for buildup
                
                for (let i = 0; i < density; i++) {
                    // Random point within a circle
                    let angle = Math.random() * Math.PI * 2;
                    let r = Math.sqrt(Math.random()) * radius;
                    let px = sprayX + Math.cos(angle) * r;
                    let py = sprayY + Math.sin(angle) * r;
                    
                    ctx.beginPath();
                    ctx.arc(px, py, Math.random() * 2 + 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Chance to create a drip if tilted
                if (tiltGravity > 0 && Math.random() < 0.1) {
                    drips.push({
                        x: sprayX + (Math.random() - 0.5) * 20,
                        y: sprayY,
                        speed: Math.random() * 1.5 * tiltGravity,
                        size: Math.random() * 2 + 1,
                        color: `hsla(${hue}, 100%, 50%, 0.8)`,
                        life: 100 + Math.random() * 100
                    });
                }
            }

            // Drip Physics Logic
            for (let i = drips.length - 1; i >= 0; i--) {
                let d = drips[i];
                d.y += d.speed;
                d.life -= 1;
                d.size *= 0.99; // Drip gets thinner as it falls

                ctx.fillStyle = d.color;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();

                if (d.life <= 0 || d.size < 0.1) {
                    drips.splice(i, 1);
                }
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
