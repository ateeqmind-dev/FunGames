<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plasma Web</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f0f13; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Buttons */
        .btn {
            position: absolute; top: 20px; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.2rem; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 20; text-decoration: none;
        }
        #btn-info { left: 20px; }
        #btn-back { right: 20px; }

        /* Info Modal */
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c24; border: 1px solid #a200ff; padding: 30px; border-radius: 16px;
            width: 80%; max-width: 400px; text-align: center; z-index: 40; color: white;
            box-shadow: 0 0 30px rgba(162, 0, 255, 0.2); display: none;
        }
        .close-modal { 
            background: #a200ff; color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="btn" id="btn-info">ℹ️</button>
    <a href="index.html" class="btn" id="btn-back">✖</a>

    <div id="info-modal">
        <h2 style="color: #a200ff; margin-bottom: 10px;">Plasma Web</h2>
        <p style="color: #888899; line-height: 1.5;">Touch and drag your fingers across the void to spawn energy nodes.<br><br>Nodes that are close to each other will automatically connect, creating a physics-based geometric web that slowly fades into the dark.</p>
        <button class="close-modal" onclick="document.getElementById('info-modal').style.display='none'">Got it</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // UI Logic
        document.getElementById('btn-info').onclick = () => document.getElementById('info-modal').style.display = 'block';

        // Game State
        let nodes = [];
        const maxConnectionDistance = 120;

        // Input Handling
        function spawnNode(x, y) {
            nodes.push({
                x: x, 
                y: y,
                vx: (Math.random() - 0.5) * 2, // Drift velocity
                vy: (Math.random() - 0.5) * 2,
                life: 255 // Fade out over time
            });
        }

        // Pointer events support both mouse and touch smoothly
        canvas.addEventListener('pointerdown', (e) => spawnNode(e.clientX, e.clientY));
        canvas.addEventListener('pointermove', (e) => {
            // e.buttons > 0 checks if the screen is actively being touched/clicked during the move
            if (e.buttons > 0) {
                // Add a node every few pixels to prevent overwhelming the array
                if (Math.random() > 0.5) spawnNode(e.clientX, e.clientY);
            }
        });

        function loop() {
            // Dark trail effect for the background
            ctx.fillStyle = '#0f0f13';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update nodes
            for (let i = nodes.length - 1; i >= 0; i--) {
                let n = nodes[i];
                n.x += n.vx;
                n.y += n.vy;
                n.life -= 1.5; // Drain life

                // Remove dead nodes
                if (n.life <= 0) {
                    nodes.splice(i, 1);
                    continue;
                }

                // Draw connecting lines to other nearby nodes
                for (let j = i - 1; j >= 0; j--) {
                    let n2 = nodes[j];
                    let dx = n.x - n2.x;
                    let dy = n.y - n2.y;
                    let distance = Math.hypot(dx, dy);

                    if (distance < maxConnectionDistance) {
                        // The closer they are, the more opaque the line
                        let opacity = (1 - (distance / maxConnectionDistance)) * (n.life / 255);
                        
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(n2.x, n2.y);
                        
                        // Mix neon purple and electric blue based on connection length
                        if (distance < 50) {
                            ctx.strokeStyle = `rgba(0, 240, 255, ${opacity})`; // Cyan for tight clusters
                        } else {
                            ctx.strokeStyle = `rgba(162, 0, 255, ${opacity})`; // Purple for long stretches
                        }
                        
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }

                // Draw the node point itself
                ctx.beginPath();
                ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${n.life / 255})`;
                ctx.fill();
            }

            requestAnimationFrame(loop);
        }

        // Start animation loop
        loop();
    </script>
</body>
</html>
