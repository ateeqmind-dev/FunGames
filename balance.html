<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass Balance</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Buttons */
        .btn {
            position: absolute; top: 20px; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.2rem; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 20; text-decoration: none;
        }
        #btn-info { left: 20px; }
        #btn-back { right: 20px; }

        /* Start Overlay */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; color: white; text-align: center; padding: 20px;
        }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background: #00e5ff; color: black;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* Info Modal */
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c24; border: 1px solid #00e5ff; padding: 30px; border-radius: 16px;
            width: 80%; max-width: 400px; text-align: center; z-index: 40; color: white;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); display: none;
        }
        .close-modal { 
            background: #00e5ff; color: black; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="btn" id="btn-info">ℹ️</button>
    <a href="index.html" class="btn" id="btn-back">✖</a>

    <div id="info-modal">
        <h2 style="color: #00e5ff; margin-bottom: 10px;">Glass Balance</h2>
        <p style="color: #888899; line-height: 1.5;">Tilt your phone smoothly to roll the steel ball into the glowing target hole.<br><br><b>Warning:</b> The glass is incredibly fragile. Any sudden jerks or fast movements will shatter the glass instantly!</p>
        <button class="close-modal" onclick="document.getElementById('info-modal').style.display='none'">Got it</button>
    </div>

    <div id="start-overlay">
        <h2>Motion Sensors Required</h2>
        <p style="color: #888899; margin-top: 10px;">This game requires tilt and sudden movement detection.</p>
        <button id="start-btn">Enable Sensors & Start</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initLevel();
        }
        window.addEventListener('resize', resize);

        document.getElementById('btn-info').onclick = () => document.getElementById('info-modal').style.display = 'block';

        // Physics State
        let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 15 };
        let target = { x: 0, y: 0, radius: 20 };
        let gravity = { x: 0, y: 0 };
        
        // Game State
        let isShattered = false;
        let glassShards = [];
        let fallScale = 1; // Used to shrink the ball when falling into the void
        const JERK_THRESHOLD = 8; // Acceleration limit before glass breaks

        // Shatter Motion Tracking
        let lastX = 0, lastY = 0, lastZ = 0;
        let lastTime = 0;

        function initLevel() {
            // Glass Pane bounds
            const padding = 40;
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 100;
            ball.vx = 0;
            ball.vy = 0;
            
            target.x = canvas.width / 2;
            target.y = 100;

            isShattered = false;
            fallScale = 1;
            glassShards = [];
        }

        // Handle Sensors
        document.getElementById('start-btn').addEventListener('click', async () => {
            let motionGranted = false;
            let orientGranted = false;

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceMotionEvent.requestPermission();
                    if (state === 'granted') motionGranted = true;
                } catch (e) { console.error(e); }
            } else { motionGranted = true; }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    if (state === 'granted') orientGranted = true;
                } catch (e) { console.error(e); }
            } else { orientGranted = true; }

            if (orientGranted) window.addEventListener('deviceorientation', handleTilt);
            if (motionGranted) window.addEventListener('devicemotion', handleJerk);

            resize();
            document.getElementById('start-overlay').style.display = 'none';
            loop();
        });

        // Smooth Tilt for Rolling
        function handleTilt(e) {
            if (isShattered) return;
            
            let tiltX = e.gamma; // left-to-right
            let tiltY = e.beta;  // front-to-back

            // Clamp and convert to gravity vector
            if (tiltX > 90) tiltX = 90; if (tiltX < -90) tiltX = -90;
            if (tiltY > 90) tiltY = 90; if (tiltY < -90) tiltY = -90;

            gravity.x = (tiltX / 90) * 0.4;
            gravity.y = (tiltY / 90) * 0.4;
        }

        // Sudden Jerk for Shattering
        function handleJerk(e) {
            if (isShattered) return;

            let current = e.accelerationIncludingGravity;
            if (!current || !current.x) return;

            let currentTime = Date.now();
            if ((currentTime - lastTime) > 100) {
                let diffTime = (currentTime - lastTime);
                lastTime = currentTime;

                let jerk = Math.abs(current.x + current.y + current.z - lastX - lastY - lastZ) / diffTime * 10000;

                if (jerk > JERK_THRESHOLD) {
                    shatterGlass();
                }

                lastX = current.x; lastY = current.y; lastZ = current.z;
            }
        }

        function shatterGlass() {
            isShattered = true;
            
            // Generate visual shards
            for(let i = 0; i < 30; i++) {
                glassShards.push({
                    x: canvas.width / 2 + (Math.random() - 0.5) * canvas.width,
                    y: canvas.height / 2 + (Math.random() - 0.5) * canvas.height,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    size: 20 + Math.random() * 60
                });
            }

            // Restart level after 3 seconds
            setTimeout(initLevel, 3000);
        }

        function loop() {
            // Dark Void Background
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const glassPadding = 30;

            if (!isShattered) {
                // Draw Glass Pane
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0, 229, 255, 0.2)';
                
                ctx.beginPath();
                ctx.roundRect(glassPadding, glassPadding, canvas.width - glassPadding*2, canvas.height - glassPadding*2, 20);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0; // Reset

                // Draw Target Hole
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.strokeStyle = '#00e5ff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00e5ff';
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Physics Update
                ball.vx += gravity.x;
                ball.vy += gravity.y;
                ball.vx *= 0.98; // Friction
                ball.vy *= 0.98;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Win Condition
                let distToHole = Math.hypot(ball.x - target.x, ball.y - target.y);
                if (distToHole < target.radius - 5) {
                    ctx.fillStyle = 'rgba(0, 229, 255, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    initLevel(); // Quick reset on win
                }

                // Fall off edge condition
                if (ball.x < glassPadding || ball.x > canvas.width - glassPadding || 
                    ball.y < glassPadding || ball.y > canvas.height - glassPadding) {
                    shatterGlass(); // Falling off breaks the illusion
                }
            } else {
                // Animate Shards
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
                ctx.lineWidth = 1;

                glassShards.forEach(s => {
                    s.x += s.vx;
                    s.y += s.vy;
                    s.vy += 0.5; // Gravity pulls shards down
                    s.rot += s.rotSpeed;

                    ctx.save();
                    ctx.translate(s.x, s.y);
                    ctx.rotate(s.rot);
                    ctx.beginPath();
                    ctx.moveTo(-s.size/2, -s.size/2);
                    ctx.lineTo(s.size/2, -s.size/4);
                    ctx.lineTo(0, s.size/2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                });

                // Animate Ball Falling
                fallScale *= 0.95;
            }

            // Draw Steel Ball
            if (fallScale > 0.05) {
                let visualRadius = ball.radius * fallScale;
                
                // Metallic Gradient
                let gradient = ctx.createRadialGradient(
                    ball.x - visualRadius * 0.3, ball.y - visualRadius * 0.3, visualRadius * 0.1, 
                    ball.x, ball.y, visualRadius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.4, '#888899');
                gradient.addColorStop(1, '#111115');

                ctx.beginPath();
                ctx.arc(ball.x, ball.y, visualRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                
                // Add drop shadow only if not falling
                if (!isShattered) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                    ctx.shadowOffsetX = 5;
                    ctx.shadowOffsetY = 5;
                }
                
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
