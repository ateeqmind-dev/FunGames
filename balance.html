<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glass Balance</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050508; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Buttons */
        .btn {
            position: absolute; top: 20px; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; font-size: 1.2rem; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 20; text-decoration: none;
        }
        #btn-info { left: 20px; }
        #btn-back { right: 20px; }

        /* Start Overlay */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; color: white; text-align: center; padding: 20px;
        }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background: #00e5ff; color: black;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* Info Modal & Settings */
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c24; border: 1px solid #00e5ff; padding: 25px; border-radius: 16px;
            width: 85%; max-width: 400px; text-align: center; z-index: 40; color: white;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); display: none;
        }

        .settings-container {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left;
        }
        .setting-row { margin-bottom: 10px; }
        .setting-row label { display: flex; justify-content: space-between; font-size: 0.9rem; color: #888899; margin-bottom: 5px; }
        .setting-row input[type=range] {
            width: 100%; accent-color: #00e5ff; background: #333; height: 6px; border-radius: 3px; outline: none;
        }

        .close-modal { 
            background: #00e5ff; color: black; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <button class="btn" id="btn-info">ℹ️</button>
    <a href="index.html" class="btn" id="btn-back">✖</a>

    <div id="info-modal">
        <h2 style="color: #00e5ff; margin-bottom: 10px;">Glass Balance</h2>
        <p style="color: #888899; line-height: 1.5; font-size: 0.95rem;">
            Tilt smoothly to roll the ball into the hole.<br>
            <b>Warning:</b> Sudden jerks will shatter the glass!
        </p>

        <div class="settings-container">
            <div class="setting-row">
                <label><span>Glass Durability</span> <span id="sens-val">Normal</span></label>
                <!-- 1 = Extremely Fragile, 100 = Almost Unbreakable -->
                <input type="range" id="glass-sens" min="1" max="100" value="50">
            </div>
        </div>

        <button class="close-modal" onclick="document.getElementById('info-modal').style.display='none'">Got it</button>
    </div>

    <div id="start-overlay">
        <h2>Sensors & Audio Required</h2>
        <p style="color: #888899; margin-top: 10px;">Tracks device tilt and plays rolling audio.</p>
        <button id="start-btn">Enable & Start</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initLevel();
        }
        window.addEventListener('resize', resize);

        // UI Setup
        const infoModal = document.getElementById('info-modal');
        const glassSensSlider = document.getElementById('glass-sens');
        const sensValText = document.getElementById('sens-val');
        
        document.getElementById('btn-info').onclick = () => infoModal.style.display = 'block';

        glassSensSlider.addEventListener('input', (e) => {
            let val = e.target.value;
            if (val < 30) sensValText.innerText = "Fragile";
            else if (val > 70) sensValText.innerText = "Tough";
            else sensValText.innerText = "Normal";
        });

        // Physics State
        let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 15 };
        let target = { x: 0, y: 0, radius: 22 };
        let gravity = { x: 0, y: 0 };
        
        // Game State
        let isShattered = false;
        let isWinning = false;
        let glassShards = [];
        let fallScale = 1; 

        // Motion Tracking
        let lastX = 0, lastY = 0, lastZ = 0;
        let lastTime = 0;

        // Audio State
        let audioCtx, rollOsc, rollGain;

        function initLevel() {
            const padding = 40;
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 100;
            ball.vx = 0;
            ball.vy = 0;
            
            target.x = canvas.width / 2;
            target.y = 100;

            isShattered = false;
            isWinning = false;
            fallScale = 1;
            glassShards = [];
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            // Init Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            rollOsc = audioCtx.createOscillator();
            rollGain = audioCtx.createGain();
            
            rollOsc.type = 'triangle'; // Low rumble for rolling steel
            rollGain.gain.value = 0;
            
            rollOsc.connect(rollGain);
            rollGain.connect(audioCtx.destination);
            rollOsc.start();

            // Init Sensors
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    await DeviceMotionEvent.requestPermission();
                    await DeviceOrientationEvent.requestPermission();
                } catch(e) { console.error(e); }
            }
            
            window.addEventListener('deviceorientation', handleTilt);
            window.addEventListener('devicemotion', handleJerk);

            resize();
            document.getElementById('start-overlay').style.display = 'none';
            loop();
        });

        // Audio Effects
        function playShatter() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function playWin() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine'; // Smooth drop sound
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.4);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function handleTilt(e) {
            if (isShattered || isWinning) return;
            
            let tiltX = e.gamma; 
            let tiltY = e.beta;  

            if (tiltX > 90) tiltX = 90; if (tiltX < -90) tiltX = -90;
            if (tiltY > 90) tiltY = 90; if (tiltY < -90) tiltY = -90;

            gravity.x = (tiltX / 90) * 0.4;
            gravity.y = (tiltY / 90) * 0.4;
        }

        function handleJerk(e) {
            if (isShattered || isWinning) return;

            let current = e.accelerationIncludingGravity;
            if (!current || !current.x) return;

            let currentTime = Date.now();
            if ((currentTime - lastTime) > 100) {
                let diffTime = (currentTime - lastTime);
                let jerk = Math.abs(current.x + current.y + current.z - lastX - lastY - lastZ) / diffTime * 10000;

                // Slider determines how much jerk is required to break it.
                // 1 = Fragile (Threshold 10), 100 = Tough (Threshold 40)
                let breakThreshold = 10 + (glassSensSlider.value * 0.3);

                if (jerk > breakThreshold) {
                    shatterGlass();
                }

                lastX = current.x; lastY = current.y; lastZ = current.z;
                lastTime = currentTime;
            }
        }

        function shatterGlass() {
            isShattered = true;
            playShatter();
            
            for(let i = 0; i < 30; i++) {
                glassShards.push({
                    x: canvas.width / 2 + (Math.random() - 0.5) * canvas.width,
                    y: canvas.height / 2 + (Math.random() - 0.5) * canvas.height,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    size: 20 + Math.random() * 60
                });
            }

            setTimeout(initLevel, 2000); // Faster restart
        }

        function triggerWin() {
            isWinning = true;
            playWin();
            
            // Snap to center of hole
            ball.x = target.x;
            ball.y = target.y;
            ball.vx = 0;
            ball.vy = 0;

            setTimeout(initLevel, 1500);
        }

        function loop() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const glassPadding = 30;

            // Audio Modulation: Roll Sound
            if (audioCtx && !isShattered && !isWinning) {
                let speed = Math.hypot(ball.vx, ball.vy);
                if (speed > 0.5) {
                    let vol = Math.min(0.15, speed * 0.015);
                    let pitch = 40 + (speed * 8);
                    rollGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
                    rollOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
                } else {
                    rollGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                }
            } else if (audioCtx) {
                rollGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }

            if (!isShattered) {
                // Draw Glass
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(glassPadding, glassPadding, canvas.width - glassPadding*2, canvas.height - glassPadding*2, 20);
                ctx.fill(); ctx.stroke();

                // Draw Hole
                ctx.beginPath();
                ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                
                // Highlight hole if close
                let distToHole = Math.hypot(ball.x - target.x, ball.y - target.y);
                ctx.strokeStyle = distToHole < target.radius * 3 ? '#00e5ff' : 'rgba(0, 229, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();

                if (!isWinning) {
                    // Physics Update
                    ball.vx += gravity.x;
                    ball.vy += gravity.y;
                    ball.vx *= 0.98;
                    ball.vy *= 0.98;
                    ball.x += ball.vx;
                    ball.y += ball.vy;

                    // Hole Condition
                    if (distToHole < target.radius - 8) {
                        triggerWin();
                    }

                    // Fall off edge condition
                    if (ball.x < glassPadding || ball.x > canvas.width - glassPadding || 
                        ball.y < glassPadding || ball.y > canvas.height - glassPadding) {
                        shatterGlass(); 
                    }
                } else {
                    // Winning animation (Ball falls in hole)
                    fallScale *= 0.85; 
                }
            } else {
                // Shard Animation
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
                ctx.lineWidth = 1;

                glassShards.forEach(s => {
                    s.x += s.vx; s.y += s.vy; s.vy += 0.5; s.rot += s.rotSpeed;
                    ctx.save();
                    ctx.translate(s.x, s.y); ctx.rotate(s.rot);
                    ctx.beginPath();
                    ctx.moveTo(-s.size/2, -s.size/2); ctx.lineTo(s.size/2, -s.size/4); ctx.lineTo(0, s.size/2);
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();
                    ctx.restore();
                });
                fallScale *= 0.9;
            }

            // Draw Steel Ball
            if (fallScale > 0.05) {
                let visualRadius = ball.radius * fallScale;
                let gradient = ctx.createRadialGradient(
                    ball.x - visualRadius * 0.3, ball.y - visualRadius * 0.3, visualRadius * 0.1, 
                    ball.x, ball.y, visualRadius
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.4, '#888899');
                gradient.addColorStop(1, '#111115');

                ctx.beginPath();
                ctx.arc(ball.x, ball.y, visualRadius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                
                if (!isShattered && !isWinning) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                    ctx.shadowOffsetX = 5; ctx.shadowOffsetY = 5;
                }
                
                ctx.fill();
                ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
