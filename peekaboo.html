<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peek-a-Boo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f0f13; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI Buttons */
        .btn {
            position: absolute; top: 20px; width: 40px; height: 40px;
            border-radius: 50%; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; font-size: 1.2rem; display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 20; text-decoration: none;
        }
        #btn-info { left: 20px; }
        #btn-back { right: 20px; }

        /* Start Overlay */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 19, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; color: white; text-align: center; padding: 20px;
        }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background: #00ff88; color: black;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px;
        }

        /* Info Modal */
        #info-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c24; border: 1px solid #00ff88; padding: 30px; border-radius: 16px;
            width: 80%; max-width: 400px; text-align: center; z-index: 40; color: white;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); display: none;
        }
        .close-modal { 
            background: #00ff88; color: black; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold;
        }

        #cam-video { display: none; }
    </style>
</head>
<body>

    <button class="btn" id="btn-info">ℹ️</button>
    <a href="index.html" class="btn" id="btn-back">✖</a>

    <div id="info-modal">
        <h2 style="color: #00ff88; margin-bottom: 10px;">Day & Night</h2>
        <p style="color: #888899; line-height: 1.5;">This world reacts to the light in your room.<br><br><b>Cover your camera</b> or turn off the lights to see the stars and hear the crickets. Reveal the camera to the light to bring out the sun and the birds!</p>
        <button class="close-modal" onclick="document.getElementById('info-modal').style.display='none'">Got it</button>
    </div>

    <div id="start-overlay">
        <h2>Camera & Audio Required</h2>
        <p style="color: #888899; margin-top: 10px;">Used to detect ambient light and play environmental sounds.</p>
        <button id="start-btn">Enable & Start</button>
    </div>

    <video id="cam-video" autoplay playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('cam-video');
        
        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });
        offscreenCanvas.width = 32; offscreenCanvas.height = 32;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        document.getElementById('btn-info').onclick = () => document.getElementById('info-modal').style.display = 'block';

        // --- State ---
        let ambientLightLevel = 255;
        let smoothedLight = 255;
        let dayRatio = 1; // 1 = Full Day, 0 = Full Night
        let time = 0;

        // Entities
        let stars = [];
        let birds = [];
        let fireflies = [];

        for(let i=0; i<100; i++) {
            stars.push({ x: Math.random(), y: Math.random() * 0.7, size: Math.random() * 1.5 + 0.5, blinkOffset: Math.random() * Math.PI * 2 });
        }
        for(let i=0; i<30; i++) {
            fireflies.push({ x: Math.random(), y: 0.7 + Math.random() * 0.3, offset: Math.random() * 100, speed: 0.5 + Math.random() });
        }

        function spawnBird() {
            birds.push({
                x: -50,
                y: canvas.height * 0.1 + Math.random() * canvas.height * 0.4,
                vx: 2 + Math.random() * 2,
                vy: (Math.random() - 0.5) * 0.5,
                flapSpeed: 0.1 + Math.random() * 0.1,
                flapOffset: Math.random() * Math.PI * 2,
                size: 10 + Math.random() * 10
            });
        }

        // --- Audio Synthesizer ---
        let audioCtx, dayGain, nightGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            dayGain = audioCtx.createGain();
            nightGain = audioCtx.createGain();
            
            dayGain.connect(audioCtx.destination);
            nightGain.connect(audioCtx.destination);
            
            scheduleBirdSound();
            scheduleCricketSound();
        }

        function scheduleBirdSound() {
            if (audioCtx && dayRatio > 0.1) {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(dayGain);

                osc.type = 'sine';
                let startFreq = 3000 + Math.random() * 2000;
                osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(startFreq - 1000, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
            setTimeout(scheduleBirdSound, 500 + Math.random() * 2000); // Random chirps
        }

        function scheduleCricketSound() {
            if (audioCtx && dayRatio < 0.9) {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(nightGain);

                osc.type = 'square';
                osc.frequency.setValueAtTime(4500 + Math.random() * 200, audioCtx.currentTime);

                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime + 0.01);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + 0.05);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
            // Crickets chirp in rhythmic pairs
            let nextChirp = Math.random() > 0.5 ? 100 : 400;
            setTimeout(scheduleCricketSound, nextChirp);
        }

        // --- Camera & Setup ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            initAudio();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    document.getElementById('start-overlay').style.display = 'none';
                    loop();
                };
            } catch (err) {
                alert("Camera access denied. It will be permanently Daytime!");
                document.getElementById('start-overlay').style.display = 'none';
                loop();
            }
        });

        // --- Math & Colors ---
        function calculateBrightness() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                offscreenCtx.drawImage(video, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
                const data = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height).data;
                let colorSum = 0;
                for (let x = 0; x < data.length; x += 4) {
                    colorSum += Math.floor((data[x] + data[x + 1] + data[x + 2]) / 3);
                }
                ambientLightLevel = Math.floor(colorSum / (offscreenCanvas.width * offscreenCanvas.height));
            }
        }

        // Interpolate between two hex colors (e.g., #FFFFFF)
        function lerpColor(a, b, amount) { 
            const ah = parseInt(a.replace(/#/g, ''), 16),
                  ar = ah >> 16, ag = ah >> 8 & 0xff, ab = ah & 0xff,
                  bh = parseInt(b.replace(/#/g, ''), 16),
                  br = bh >> 16, bg = bh >> 8 & 0xff, bb = bh & 0xff,
                  rr = ar + amount * (br - ar),
                  rg = ag + amount * (bg - ag),
                  rb = ab + amount * (bb - ab);
            return '#' + (((1 << 24) + (rr << 16) + (rg << 8) + rb) | 0).toString(16).slice(1);
        }

        function loop() {
            time += 0.05;
            calculateBrightness();
            
            // Smooth light and map to 0.0 (Night) to 1.0 (Day)
            smoothedLight += (ambientLightLevel - smoothedLight) * 0.05;
            dayRatio = Math.max(0, Math.min(1, (smoothedLight - 30) / 80));

            // Crossfade Audio Volumes
            if (audioCtx) {
                dayGain.gain.setTargetAtTime(dayRatio, audioCtx.currentTime, 0.1);
                nightGain.gain.setTargetAtTime(1 - dayRatio, audioCtx.currentTime, 0.1);
            }

            // --- Draw Sky ---
            let topColor = lerpColor('#040b14', '#55b4ff', dayRatio);
            let botColor = lerpColor('#13182b', '#bce6ff', dayRatio);
            
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, topColor);
            skyGrad.addColorStop(1, botColor);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- Draw Stars (Night) ---
            if (dayRatio < 1) {
                ctx.fillStyle = '#ffffff';
                stars.forEach(s => {
                    let blink = (Math.sin(time * 0.5 + s.blinkOffset) + 1) / 2;
                    ctx.globalAlpha = (1 - dayRatio) * blink;
                    ctx.beginPath();
                    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1.0;
            }

            // --- Draw Sun and Moon ---
            // Sun rises as dayRatio goes to 1. Moon rises as dayRatio goes to 0.
            let sunY = canvas.height * 0.8 - (dayRatio * canvas.height * 0.6);
            let moonY = canvas.height * 0.8 - ((1 - dayRatio) * canvas.height * 0.6);
            let centerX = canvas.width / 2;

            // Draw Moon
            ctx.fillStyle = '#f6f6f6';
            ctx.shadowBlur = 30; ctx.shadowColor = 'rgba(255,255,255,0.5)';
            ctx.beginPath(); ctx.arc(centerX + 100, moonY, 40, 0, Math.PI * 2); ctx.fill();
            // Moon craters
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(centerX + 90, moonY - 10, 10, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(centerX + 115, moonY + 15, 8, 0, Math.PI * 2); ctx.fill();

            // Draw Sun
            ctx.fillStyle = '#ffe600';
            ctx.shadowBlur = 50; ctx.shadowColor = '#ffaa00';
            ctx.beginPath(); ctx.arc(centerX - 100, sunY, 50, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;

            // --- Draw Birds (Day) ---
            if (dayRatio > 0.3 && Math.random() < 0.02 && birds.length < 8) spawnBird();
            
            ctx.strokeStyle = `rgba(0, 0, 0, ${dayRatio})`; // Fade out at night
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let i = birds.length - 1; i >= 0; i--) {
                let b = birds[i];
                b.x += b.vx;
                b.y += b.vy;
                
                let flap = Math.sin(time * b.flapSpeed + b.flapOffset) * (b.size * 0.5);
                
                ctx.beginPath();
                ctx.moveTo(b.x, b.y);
                ctx.quadraticCurveTo(b.x + b.size/2, b.y - flap, b.x + b.size, b.y - b.size*0.3);
                ctx.moveTo(b.x, b.y);
                ctx.quadraticCurveTo(b.x - b.size/2, b.y - flap, b.x - b.size, b.y - b.size*0.3);
                ctx.stroke();

                if (b.x > canvas.width + 50) birds.splice(i, 1);
            }

            // --- Draw Grass/Hills ---
            let hillColorDark = lerpColor('#06140e', '#328a45', dayRatio);
            let hillColorLight = lerpColor('#0a1f16', '#4caf50', dayRatio);

            ctx.fillStyle = hillColorDark;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.lineTo(0, canvas.height * 0.7);
            ctx.bezierCurveTo(canvas.width * 0.3, canvas.height * 0.6, canvas.width * 0.7, canvas.height * 0.9, canvas.width, canvas.height * 0.75);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            ctx.fillStyle = hillColorLight;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            ctx.lineTo(0, canvas.height * 0.8);
            ctx.bezierCurveTo(canvas.width * 0.4, canvas.height * 0.7, canvas.width * 0.6, canvas.height * 0.85, canvas.width, canvas.height * 0.8);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();

            // --- Draw Fireflies (Night) ---
            if (dayRatio < 0.7) {
                fireflies.forEach(f => {
                    let px = (f.x * canvas.width) + Math.sin(time * f.speed + f.offset) * 20;
                    let py = (f.y * canvas.height) + Math.cos(time * f.speed * 0.8 + f.offset) * 15;
                    
                    let glow = (Math.sin(time * 2 + f.offset) + 1) / 2; // Pulsing glow
                    let nightFactor = (1 - dayRatio);

                    ctx.fillStyle = `rgba(200, 255, 0, ${glow * nightFactor})`;
                    ctx.shadowBlur = 15; ctx.shadowColor = '#c8ff00';
                    ctx.beginPath();
                    ctx.arc(px, py, 2, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
